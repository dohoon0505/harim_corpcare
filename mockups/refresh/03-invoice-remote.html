<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>USER · 거래명세서 — 우측 리모컨 신규 디자인</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<style>
  :root{
    --c-orange:#f15a2a; --c-orange-hover:#d94e24; --c-orange-ink:#d94000; --c-orange-soft:#fff1ec;
    --c-blue:#4169e1; --c-blue-soft:#f0f3fd;
    --c-dark:#111118; --c-dark-hover:#2b2b33;
    --c-bg:#f9f9f9; --c-surface-2:#f5f5f7;
    --c-border:#e0e0e0; --c-border-strong:#d8d8d8; --c-border-input:#e3e3e3; --c-divider:#e8e8e8;
    --c-text-strong:#111; --c-text:#222; --c-text-2:#444; --c-text-3:#555;
    --c-text-muted:#888; --c-text-faint:#aaa;
    --c-success:#2e7d32; --c-success-bg:#e8f5e9;
    --c-danger:#c62828; --c-danger-bg:#ffebee;
    --c-indigo:#4f46e5;
    --r-md:6px; --r-lg:8px; --r-xl:10px;
    --sh-card:0 1px 6px rgba(17,17,24,.04);
    --sh-btn:0 2px 8px rgba(241,90,42,.28);
    --sh-pop:0 8px 28px rgba(17,17,24,.14);
    --ring-field:0 0 0 3px rgba(79,70,229,.14);
    --font:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--font); background:var(--c-bg); color:var(--c-text); font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased; letter-spacing:-.011em;}
  button{font-family:inherit; letter-spacing:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}

  .wrap{max-width:1250px; margin:0 auto; padding:28px 32px 90px;}
  .pagetitle{display:flex; align-items:center; gap:9px; font-size:22px; font-weight:700; color:var(--c-text-strong); letter-spacing:-.02em; margin-bottom:18px;}
  .cols{display:flex; gap:20px; align-items:flex-start;}
  .doc{flex:0 0 794px; width:794px;}
  .a4-frame{border:1px solid var(--c-border); border-radius:4px; overflow:hidden; box-shadow:var(--sh-card); width:794px; background:#fff;}

  /* ══════════ 신규 리모컨 (단일 통합 패널) ══════════ */
  .remote{flex:1; min-width:300px; position:sticky; top:24px;
    background:#fff; border:1px solid var(--c-border); border-radius:14px;
    box-shadow:0 4px 16px rgba(17,17,24,.07);}
  /* overflow:hidden 금지 — 드롭다운 패널이 잘려 먹통이 됨 */
  /* ① 기간 헤더 — 라이트 톤 (카드 헤더 + 미니 스테퍼) */
  .rm-period{padding:16px 18px 16px; border-bottom:1px solid var(--c-divider);}
  .rm-period__top{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .rm-step{width:32px; height:32px; border-radius:var(--r-lg); display:grid; place-items:center;
    background:#fff; border:1px solid var(--c-border); color:var(--c-text-3); font-size:14px; transition:all .13s;}
  .rm-step:hover{border-color:var(--c-border-strong); background:var(--c-bg);}
  .rm-step:disabled{opacity:.35; cursor:default;}
  .rm-period__label{text-align:center;}
  .rm-period__label b{font-size:16px; font-weight:700; color:var(--c-text-strong); letter-spacing:-.01em;}
  .rm-period__label span{display:block; font-size:10.5px; color:var(--c-text-faint); margin-top:1px;}
  .rm-period__dds{display:flex; gap:8px; margin-top:12px;}
  /* 커스텀 드롭다운 (유지 — 표준 라이트 스타일) */
  .dd{position:relative; flex:1;}
  .dd-trigger{width:100%; height:42px; padding:0 32px 0 13px; text-align:left; font-size:13.5px; font-weight:600;
    background:#fff; border:1px solid var(--c-border-input); border-radius:var(--r-lg);
    color:var(--c-text-strong); position:relative; transition:border-color .15s, box-shadow .15s;}
  .dd-trigger::after{content:""; position:absolute; right:13px; top:50%; width:7px; height:7px;
    border-right:1.6px solid var(--c-text-muted); border-bottom:1.6px solid var(--c-text-muted);
    transform:translateY(-70%) rotate(45deg); transition:transform .18s;}
  .dd.open .dd-trigger::after{transform:translateY(-30%) rotate(225deg);}
  .dd-trigger:hover{border-color:var(--c-border-strong);}
  .dd.open .dd-trigger{border-color:var(--c-indigo); box-shadow:var(--ring-field);}
  .dd-panel{display:none; position:absolute; left:0; right:0; top:calc(100% + 6px); z-index:30;
    background:#fff; border:1px solid var(--c-border); border-radius:var(--r-lg);
    box-shadow:var(--sh-pop); max-height:250px; overflow-y:auto; padding:5px;}
  .dd.open .dd-panel{display:block;}
  .dd-panel::-webkit-scrollbar{width:12px;}
  .dd-panel::-webkit-scrollbar-thumb{background:var(--c-border-strong); border-radius:8px; border:3.5px solid #fff;}
  .dd-opt{width:100%; display:block; padding:8px 12px; font-size:13.5px; text-align:left; border-radius:var(--r-md); color:var(--c-text-2);}
  .dd-opt:hover{background:var(--c-surface-2);}
  .dd-opt.sel{background:var(--c-blue); color:#fff; font-weight:600;}

  /* ② 금액 — 차분한 요약 (필 제거 · 텍스트 라인) */
  .rm-hero{padding:18px 20px 16px; border-bottom:1px solid var(--c-divider);}
  .rm-hero .lbl{font-size:12px; color:var(--c-text-muted); font-weight:600;}
  .rm-hero .amt{font-size:26px; font-weight:700; color:var(--c-text-strong); letter-spacing:-.02em; margin-top:3px;}
  .rm-hero .due{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-top:12px;
    padding-top:12px; border-top:1px solid var(--c-divider); font-size:12.5px; color:var(--c-text-muted);}
  .rm-hero .due b{color:var(--c-danger); font-weight:600;}

  /* ③ 정산 프로세스 스텝 — 저대비 (솔리드·그림자 제거) */
  .rm-flow{display:flex; align-items:center; padding:14px 20px; border-bottom:1px solid var(--c-divider); gap:0;}
  .rm-node{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;}
  .rm-node .dot{width:22px; height:22px; border-radius:50%; display:grid; place-items:center; font-size:11px; font-weight:700;
    background:#fff; color:var(--c-text-faint); border:1.5px solid var(--c-border);}
  .rm-node span{font-size:11px; color:var(--c-text-muted); font-weight:500; white-space:nowrap;}
  .rm-node.done .dot{border-color:var(--c-success); color:var(--c-success);}
  .rm-node.done span{color:var(--c-success);}
  .rm-node.cur .dot{border-color:var(--c-orange); color:var(--c-orange-ink);}
  .rm-node.cur span{color:var(--c-orange-ink); font-weight:700;}
  .rm-link{flex:0 0 24px; height:1px; background:var(--c-border); margin-bottom:17px;}

  /* ④ 액션 */
  .rm-actions{padding:16px 18px 6px; display:flex; flex-direction:column; gap:9px;}
  .rm-btn{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:50px;
    border-radius:var(--r-xl); font-size:14.5px; font-weight:700; transition:background .14s, border-color .14s;}
  .rm-btn--primary{background:var(--c-orange); color:#fff; box-shadow:var(--sh-btn);}
  .rm-btn--primary:hover{background:var(--c-orange-hover);}
  .rm-btn--secondary{background:#fff; border:1px solid var(--c-border-strong); color:var(--c-text-2); font-weight:600;}
  .rm-btn--secondary:hover{border-color:var(--c-text-muted); background:var(--c-bg);}
  .rm-btn--dark{background:var(--c-dark); color:#fff;}
  .rm-btn--dark:hover{background:var(--c-dark-hover);}

  /* ⑤ 동의 — 조용한 섹션 (워시·대시 보더 제거) */
  .rm-agree{margin:14px 18px 16px; padding-top:14px; border-top:1px solid var(--c-divider);}
  .rm-agree p{font-size:12px; color:var(--c-text-muted); line-height:1.65;}
  .rm-agree p b{color:var(--c-text-2); font-weight:600;}
  .rm-agree button{margin-top:10px; width:100%; height:46px; border-radius:var(--r-lg);
    background:#fff; border:1px solid var(--c-orange); color:var(--c-orange-ink); font-size:13.5px; font-weight:600; transition:background .13s;}
  .rm-agree button:hover{background:var(--c-orange-soft);}
  .rm-agree.done{border-top:1px solid var(--c-divider); background:none; border-radius:0;}
  .rm-agree.done .complete{background:var(--c-success-bg); border-radius:var(--r-lg); padding:12px 14px;}
  .rm-agree.done .pending{display:none;}
  .rm-agree .complete{display:none; align-items:center; gap:9px;}
  .rm-agree.done .complete{display:flex;}
  .rm-agree .complete .ck{width:24px; height:24px; flex:0 0 24px; border-radius:50%; background:var(--c-success); color:#fff; display:grid; place-items:center; font-size:12px;}
  .rm-agree .complete b{font-size:13px; color:var(--c-success); display:block;}

  .rm-foot{padding:0 18px 16px; font-size:11px; color:var(--c-text-faint); text-align:center;}

  .toast{position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(14px);
    background:var(--c-dark); color:#fff; font-size:14px; font-weight:600; padding:12px 22px;
    border-radius:999px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:60; box-shadow:var(--sh-pop);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media print{
    .pagetitle,.remote,.toast{display:none!important;}
    html,body{background:#fff;}
    .wrap{padding:0; max-width:none;}
    .cols{display:block;}
    .a4-frame{border:none; box-shadow:none; border-radius:0;}
  }
</style>

/* ── 커스텀 드롭다운 (유지) ── */
function makeDropdown(rootId, { unit, options, get, set }) {
  const root = $("#" + rootId);
  const trigger = root.querySelector(".dd-trigger");
  const panel = root.querySelector(".dd-panel");
  const renderTrigger = () => { trigger.textContent = get() + unit; };
  const close = () => { root.classList.remove("open"); trigger.setAttribute("aria-expanded", "false"); };
  function open() {
    document.querySelectorAll(".dd.open").forEach((d) => d !== root && d.classList.remove("open"));
    panel.innerHTML = options().map((v) =>
      `<button type="button" class="dd-opt ${v === get() ? "sel" : ""}" role="option" aria-selected="${v === get()}" data-v="${v}">${v}${unit}</button>`).join("");
    root.classList.add("open");
    trigger.setAttribute("aria-expanded", "true");
    const sel = panel.querySelector(".dd-opt.sel");
    if (sel) panel.scrollTop = sel.offsetTop - panel.clientHeight / 2 + sel.offsetHeight / 2;
  }
  trigger.addEventListener("click", () => root.classList.contains("open") ? close() : open());
  panel.addEventListener("click", (e) => {
    const o = e.target.closest("[data-v]"); if (!o) return;
    set(o.dataset.v); renderTrigger(); close();
  });
  document.addEventListener("click", (e) => { if (!root.contains(e.target)) close(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") close(); });
  return { renderTrigger };
}
const ddY = makeDropdown("ddYear", { unit: "년", options: () => ["2024", "2025", "2026"],

const ddM = makeDropdown("ddMonth", { unit: "월", options: () => Array.from({ length: 12 }, (_, i) => pad(i + 1)),
  get: () => pad(state.month), set: (v) => { state.month = +v; render(); } });

/* ── 월 스테퍼 ── */
$("#prevM").addEventListener("click", () => { state.month--; if (state.month < 1) { state.month = 12; state.year--; } render(); });

  table: "width:100%;border-collapse:collapse;table-layout:fixed;border:1px solid #d4d4d4;font-size:12px;font-family:Pretendard,sans-serif;",
  th: "background:#f5f5f5;padding:11px 14px;font-weight:600;color:#444;border:1px solid #d4d4d4;text-align:left;vertical-align:middle;line-height:1.4;white-space:nowrap;overflow:hidden;",
  td: "padding:11px 14px;color:#333;border:1px solid #d4d4d4;vertical-align:middle;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;",
  infoLabel: "background:#f5f5f5;padding:9px 10px;font-weight:600;color:#444;border:1px solid #d4d4d4;vertical-align:middle;line-height:1.4;white-space:nowrap;overflow:hidden;",
  infoValue: "padding:9px 10px;color:#333;border:1px solid #d4d4d4;vertical-align:middle;line-height:1.4;word-break:break-all;",
  address: "padding:11px 14px;color:#333;border:1px solid #d4d4d4;vertical-align:middle;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;",
  sectionTitle: "margin:0 0 7px;font-size:12px;font-weight:700;color:#222;padding-bottom:5px;border-bottom:2px solid #333;",
};
function infoTable(title, rows) {
  return `<div style="margin-bottom:22px"><p style="${S.sectionTitle}">${title}</p>
    <table style="${S.table}"><colgroup><col style="width:100px"/><col/><col style="width:100px"/><col/><col style="width:100px"/><col/></colgroup><tbody>
    ${rows.map((cells) => cells.length === 1
      ? `<tr><td style="${S.infoLabel}">${cells[0].label}</td><td style="${S.infoValue}" colspan="5">${cells[0].value}</td></tr>`
      : `<tr>${cells.map((c) => `<td style="${S.infoLabel}">${c.label}</td><td style="${S.infoValue}" colspan="${c.valueColSpan ?? 1}">${c.value}</td>`).join("")}</tr>`).join("")}
    </tbody></table></div>`;
}
function invoiceDoc(d) {
  return `<div class="invoice-doc" style="width:794px;height:1123px;background:#fff;font-family:Pretendard,sans-serif;font-size:12px;color:#333;padding:36px 44px 28px;box-sizing:border-box;display:flex;flex-direction:column;overflow:hidden;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px">
      <div><p style="margin:0 0 4px;font-size:13px;font-weight:700;color:#f15a2a;white-space:nowrap">하림그룹 경조화환 시스템</p>
      <p style="margin:0;font-size:18px;font-weight:700;color:#222">${d.title}</p></div>
      <span style="font-size:12px;font-weight:600;color:#666;white-space:nowrap">${d.period}</span>
    </div>
    ${infoTable("공급받는자", [
      [{ label:"사업장주소", value:d.buyer.address }],
      [{ label:"회사명", value:d.buyer.company }, { label:"사업자번호", value:d.buyer.bizNumber }, { label:"대표자명", value:d.buyer.ceo }],
      [{ label:"명세요약", value:d.buyer.summary }, { label:"명세서 발행일", value:d.buyer.issueDate }, { label:"계산서 발행", value:d.buyer.invoiceNote }],
    ])}
    ${infoTable("공급자", [
      [{ label:"회사명", value:d.supplier.company }, { label:"사업자번호", value:d.supplier.bizNumber }, { label:"대표자명", value:d.supplier.ceo }],
      [{ label:"E-MAIL", value:d.supplier.email, valueColSpan:3 }, { label:"FAX", value:d.supplier.fax }],
    ])}
    <div style="flex:1;min-height:0;margin-bottom:22px">
      <p style="${S.sectionTitle}">거래내역</p>
      <table style="${S.table}"><colgroup><col style="width:148px"/><col style="width:70px"/><col/><col style="width:128px"/><col style="width:92px"/></colgroup>
        <thead><tr><th style="${S.th}">배송요청일시</th><th style="${S.th}text-align:center;">발송인</th><th style="${S.th}">배송지 정보</th><th style="${S.th}">주문상품</th><th style="${S.th}text-align:center;">결제금액</th></tr></thead>
        <tbody>${d.items.length === 0
          ? `<tr><td style="${S.td}text-align:center;color:#999;padding:40px 14px;" colspan="5">해당 월의 거래 내역이 없습니다</td></tr>`
          : d.items.map((it) => `<tr><td style="${S.td}">${it.date}</td><td style="${S.td}text-align:center;">${it.sender}</td><td style="${S.address}">${it.address}</td><td style="${S.td}">${it.product}</td><td style="${S.td}text-align:center;">${it.amount}</td></tr>`).join("")}
        </tbody></table>
    </div>
    <table style="${S.table}margin-top:auto;">
      <colgroup><col/><col style="width:185px"/></colgroup><tbody><tr>
        <td style="${S.td}white-space:nowrap;"><span style="font-weight:700;color:#444;margin-right:12px">입금계좌 안내</span><span>${d.account}</span></td>
        <td style="${S.td}background:#f8f8f8;text-align:right;"><span style="font-weight:600;color:#444">정산금액 </span><span style="font-weight:700;color:#f15a2a;font-size:14px">${d.total}</span></td>
      </tr></tbody></table>
  </div>`;
}

function render() {
  const key = `${state.year}-${pad(state.month)}`;
  const data = DB[key];
  const label = `${state.year}년 ${pad(state.month)}월`;
  const total = data ? data.rows.reduce((a, r) => a + r[4], 0) : 0;
  $("#docHost").innerHTML = invoiceDoc({
    title: `${String(state.year).slice(2)}년 ${pad(state.month)}월 거래명세서`,
    period: `${label} 귀속`,
    buyer: { ...BUYER, issueDate: data ? data.issue : "-" },
    supplier: SUPPLIER,
    items: data ? data.rows.map((r) => ({ date:r[0], sender:r[1], address:r[2], product:r[3], amount:won(r[4]) })) : [],
    account: ACCOUNT, total: won(total),
  });
  $("#periodLbl").textContent = label;
  $("#heroLbl").textContent = label + " 결제금액";
  $("#heroAmt").textContent = won(total);
  $("#heroDue").textContent = data ? data.due : "—";
  ddY.renderTrigger(); ddM.renderTrigger();
}

/* ── 액션 ── */
let toastTimer = null;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}
$("#btnPdf").addEventListener("click", () => window.print());
$("#btnExcel").addEventListener("click", () => toast("EXCEL 파일이 저장되었습니다 (데모 · 실서비스는 util/xlsx.js)"));
$("#btnLink").addEventListener("click", () => toast("거래명세서 열람링크가 복사되었습니다 · 링크만으로 접속이 가능해요"));
$("#btnAgree").addEventListener("click", () => {
  state.agreed = true;
  $("#agreeZone").classList.add("done");
  const d = new Date();
  $("#agreeDate").textContent = `${d.getFullYear()}. ${pad(d.getMonth() + 1)}. ${pad(d.getDate())} 동의`;
  /* 프로세스 스텝 갱신: 동의 완료 → 입금 대기 */
  const agree = $("#nodeAgree"), pay = $("#nodePay");
  agree.className = "rm-node done"; agree.querySelector(".dot").textContent = "✓";
  pay.className = "rm-node cur";
  toast("계산서 발급에 동의했습니다");
});

render();
</script>
</body>
</html>
