# 정적 SPA(하림그룹 경조화환 시스템)를 GitHub Pages에 배포.
# Settings → Pages → Source = "GitHub Actions" 필요(전환 완료됨).
# 별도 빌드 단계 없음(바닐라 HTML/CSS/JS) → 저장소 루트를 그대로 업로드한다.
# CNAME(커스텀 도메인)·.nojekyll 파일이 루트에 있어 함께 배포된다.
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# GITHUB_TOKEN 권한: Pages 배포 + OIDC 토큰
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포는 1건만 유지(진행 중 배포는 취소하지 않음)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
